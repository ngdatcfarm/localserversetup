<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFarm - Quản lý trang trại</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-100 min-h-screen">
<div id="app">
    <!-- Sidebar -->
    <div class="flex h-screen overflow-hidden">
        <!-- Mobile menu toggle -->
        <div class="lg:hidden fixed top-0 left-0 z-50 p-3">
            <button @click="sidebarOpen = !sidebarOpen" class="text-gray-600 bg-white rounded-lg shadow p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <!-- Sidebar overlay -->
        <div v-if="sidebarOpen" @click="sidebarOpen = false" class="lg:hidden fixed inset-0 bg-black bg-opacity-50 z-40"></div>

        <!-- Sidebar -->
        <aside :class="[sidebarOpen ? 'translate-x-0' : '-translate-x-full', 'lg:translate-x-0']"
               class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-green-800 text-white transform transition-transform duration-200 flex flex-col">
            <!-- Logo -->
            <div class="p-4 border-b border-green-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span class="text-2xl">🌾</span> CFarm
                </h1>
                <p class="text-green-300 text-xs mt-1">Local Server v0.9.0</p>
            </div>

            <!-- Nav -->
            <nav class="flex-1 overflow-y-auto py-4">
                <router-link v-for="item in navItems" :key="item.path" :to="item.path"
                    @click="sidebarOpen = false"
                    class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-green-700 transition-colors"
                    active-class="bg-green-700 border-r-4 border-green-300">
                    <span class="text-lg">{{ item.icon }}</span>
                    <span>{{ item.label }}</span>
                </router-link>
                <!-- External links -->
                <div class="border-t border-green-700 mt-2 pt-2">
                    <a v-for="link in externalLinks" :key="link.href" :href="link.href" target="_blank"
                        class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-green-700 transition-colors">
                        <span class="text-lg">{{ link.icon }}</span>
                        <span>{{ link.label }}</span>
                        <span class="text-xs text-green-400 ml-auto">&#8599;</span>
                    </a>
                </div>
            </nav>

            <!-- Server status -->
            <div class="p-4 border-t border-green-700 text-xs">
                <div class="flex items-center gap-2">
                    <span :class="serverStatus.ok ? 'bg-green-400' : 'bg-red-400'" class="w-2 h-2 rounded-full"></span>
                    <span>{{ serverStatus.ok ? 'Server Online' : 'Offline' }}</span>
                </div>
                <div v-if="serverStatus.mqtt" class="flex items-center gap-2 mt-1">
                    <span :class="serverStatus.mqtt ? 'bg-green-400' : 'bg-red-400'" class="w-2 h-2 rounded-full"></span>
                    <span>MQTT {{ serverStatus.mqtt ? 'Connected' : 'Disconnected' }}</span>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-4 lg:p-6 pt-14 lg:pt-6">
                <router-view></router-view>
            </div>
        </main>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
