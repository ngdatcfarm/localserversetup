<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>Camera Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { surface: '#1a1f2e', card: '#212736', border: '#2d3348' }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

        /* Smooth card interactions */
        .cam-card { transition: transform 0.15s, box-shadow 0.15s; }
        .cam-card:active { transform: scale(0.98); }
        @media (hover: hover) { .cam-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); } }

        /* Bottom sheet */
        .sheet-backdrop { transition: opacity 0.25s; }
        .sheet-panel {
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 92vh; overflow-y: auto;
            border-radius: 20px 20px 0 0;
        }
        .sheet-backdrop.hidden .sheet-panel { transform: translateY(100%); }

        /* Status dot pulse */
        @keyframes pulse-live { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .pulse-live { animation: pulse-live 2s infinite; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

        /* Toast slide-in */
        .toast-in { animation: toastIn 0.3s ease-out; }
        @keyframes toastIn { from { transform: translateY(100%); opacity:0; } to { transform: translateY(0); opacity:1; } }

        /* Input focus */
        input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.25); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-gray-900/80 backdrop-blur-lg border-b border-gray-800">
        <div class="px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                        <i class="fas fa-shield-halved text-sm"></i>
                    </div>
                    <span class="font-bold text-lg hidden sm:inline">Camera Server</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="cameraCount" class="text-gray-500 text-sm hidden sm:inline">0 cameras</span>
                    <a href="/recordings" class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 active:bg-gray-800 px-3 py-2 rounded-xl text-sm font-medium transition-colors">
                        <i class="fas fa-circle-dot text-red-400 text-xs"></i> <span class="hidden sm:inline">Ban ghi</span>
                    </a>
                    <!-- Desktop add button -->
                    <button onclick="openAddModal()" class="hidden sm:flex items-center gap-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 px-4 py-2 rounded-xl text-sm font-medium transition-colors">
                        <i class="fas fa-plus text-xs"></i> Them Camera
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto pb-24 sm:pb-8">

        <!-- Stats Row -->
        <div class="flex gap-3 py-4 overflow-x-auto no-scrollbar">
            <div class="flex-shrink-0 bg-card rounded-2xl px-4 py-3 min-w-[120px] border border-border">
                <div class="text-gray-500 text-xs font-medium uppercase tracking-wide">Tổng</div>
                <div class="text-2xl font-bold mt-0.5" id="totalCameras">0</div>
            </div>
            <div class="flex-shrink-0 bg-card rounded-2xl px-4 py-3 min-w-[120px] border border-border">
                <div class="text-gray-500 text-xs font-medium uppercase tracking-wide">Online</div>
                <div class="text-2xl font-bold mt-0.5 text-emerald-400" id="onlineCameras">0</div>
            </div>
            <div class="flex-shrink-0 bg-card rounded-2xl px-4 py-3 min-w-[120px] border border-border">
                <div class="text-gray-500 text-xs font-medium uppercase tracking-wide">Offline</div>
                <div class="text-2xl font-bold mt-0.5 text-red-400" id="offlineCameras">0</div>
            </div>
        </div>

        <!-- Camera Grid -->
        <div id="cameraGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-20 hidden">
            <div class="w-20 h-20 rounded-full bg-gray-800 flex items-center justify-center mb-5">
                <i class="fas fa-video text-gray-600 text-3xl"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-300 mb-1">Chưa có camera nào</h3>
            <p class="text-gray-500 text-sm mb-6">Thêm camera đầu tiên để bắt đầu</p>
            <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 px-6 py-3 rounded-xl font-medium transition-colors">
                <i class="fas fa-plus mr-2"></i>Thêm Camera
            </button>
        </div>
    </main>

    <!-- FAB - Mobile only -->
    <button onclick="openAddModal()" class="sm:hidden fixed bottom-6 right-4 w-14 h-14 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-2xl shadow-lg shadow-blue-600/30 flex items-center justify-center z-30 transition-transform active:scale-90">
        <i class="fas fa-plus text-lg"></i>
    </button>

    <!-- Bottom Sheet Modal -->
    <div id="cameraModal" class="sheet-backdrop fixed inset-0 z-50 hidden" onclick="handleBackdropClick(event)">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="absolute bottom-0 left-0 right-0 sheet-panel bg-card" id="sheetPanel">
            <!-- Handle bar -->
            <div class="flex justify-center pt-3 pb-1">
                <div class="w-10 h-1 rounded-full bg-gray-600"></div>
            </div>
            <div class="px-5 pb-2 flex justify-between items-center">
                <h3 id="modalTitle" class="text-lg font-bold">Thêm Camera</h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-gray-400 hover:text-white">
                    <i class="fas fa-xmark text-sm"></i>
                </button>
            </div>

            <form id="cameraForm" class="px-5 pb-8 space-y-3">
                <input type="hidden" id="cameraId">

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-medium">ID</label>
                        <input type="text" id="cameraIdInput" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" placeholder="cam_001" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-medium">Tên</label>
                        <input type="text" id="cameraName" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" placeholder="Camera cổng" required>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-2">
                        <label class="block text-xs text-gray-400 mb-1 font-medium">IP</label>
                        <input type="text" id="cameraIp" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" placeholder="192.168.1.27" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-medium">Port</label>
                        <input type="number" id="cameraPort" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" value="554">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-medium">Username</label>
                        <input type="text" id="cameraUsername" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" placeholder="admin">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-medium">Password</label>
                        <input type="password" id="cameraPassword" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-medium">RTSP Path</label>
                    <input type="text" id="cameraRtspPath" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3.5 py-2.5 text-sm" placeholder="/unicast/c1/s0/live">
                </div>

                <label class="flex items-center gap-2.5 py-1 cursor-pointer">
                    <div class="relative">
                        <input type="checkbox" id="cameraEnabled" class="sr-only peer" checked>
                        <div class="w-10 h-6 bg-gray-700 rounded-full peer-checked:bg-blue-600 transition-colors"></div>
                        <div class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                    </div>
                    <span class="text-sm text-gray-300">Kích hoạt camera</span>
                </label>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 active:bg-gray-800 rounded-xl font-medium text-sm transition-colors">Hủy</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-xl font-medium text-sm transition-colors">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-20 sm:bottom-6 left-4 right-4 sm:left-auto sm:right-6 sm:w-80 z-50 hidden">
        <div id="toastInner" class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg text-sm font-medium toast-in">
            <i id="toastIcon" class="fas fa-check-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script>
        let cameras = [];

        document.addEventListener('DOMContentLoaded', loadCameras);

        async function loadCameras() {
            try {
                const res = await fetch('/api/cameras');
                cameras = await res.json();
                renderCameras();
                updateStats();
            } catch (e) {
                showToast('Lỗi tải danh sách camera', 'error');
            }
        }

        function updateStats() {
            document.getElementById('totalCameras').textContent = cameras.length;
            document.getElementById('cameraCount').textContent = `${cameras.length} cameras`;
            const online = cameras.filter(c => c.enabled).length;
            document.getElementById('onlineCameras').textContent = online;
            document.getElementById('offlineCameras').textContent = cameras.length - online;
        }

        function renderCameras() {
            const grid = document.getElementById('cameraGrid');
            const empty = document.getElementById('emptyState');

            if (cameras.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }
            grid.classList.remove('hidden');
            empty.classList.add('hidden');

            grid.innerHTML = cameras.map(cam => `
                <div class="cam-card bg-card rounded-2xl border border-border overflow-hidden">
                    <a href="/stream/${cam.id}" class="block relative aspect-video bg-gray-900">
                        <img src="/stream/${cam.id}/snapshot"
                             class="w-full h-full object-cover"
                             loading="lazy"
                             onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden')">
                        <div class="absolute inset-0 items-center justify-center hidden bg-gray-900">
                            <i class="fas fa-video-slash text-gray-700 text-3xl"></i>
                        </div>
                        <!-- Status badge -->
                        <div class="absolute top-2.5 left-2.5">
                            <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-lg text-[11px] font-semibold tracking-wide
                                ${cam.enabled ? 'bg-emerald-500/20 text-emerald-400' : 'bg-gray-700/80 text-gray-400'}">
                                <span class="w-1.5 h-1.5 rounded-full ${cam.enabled ? 'bg-emerald-400 pulse-live' : 'bg-gray-500'}"></span>
                                ${cam.enabled ? 'LIVE' : 'OFF'}
                            </span>
                        </div>
                        <!-- FPS -->
                        <div class="absolute bottom-2.5 right-2.5">
                            <span id="fps-${cam.id}" class="px-2 py-0.5 rounded-lg text-[11px] bg-black/50 text-gray-300 font-mono">-- fps</span>
                        </div>
                        <!-- Play overlay -->
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/20">
                            <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur flex items-center justify-center">
                                <i class="fas fa-play text-white ml-0.5"></i>
                            </div>
                        </div>
                    </a>
                    <div class="p-3.5">
                        <div class="flex items-start justify-between">
                            <div class="min-w-0 flex-1">
                                <h3 class="font-semibold text-[15px] truncate">${cam.name}</h3>
                                <p class="text-gray-500 text-xs mt-0.5 truncate">${cam.ip}:${cam.port}</p>
                            </div>
                            <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                                <button onclick="event.stopPropagation();toggleRecording('${cam.id}')" id="rec-btn-${cam.id}"
                                        class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:text-red-400 hover:bg-red-400/10 transition-colors"
                                        title="Ghi hinh">
                                    <i class="fas fa-circle text-xs"></i>
                                </button>
                                <button onclick="event.stopPropagation();editCamera('${cam.id}')"
                                        class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:text-white hover:bg-gray-700 transition-colors"
                                        title="Chinh sua">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="event.stopPropagation();deleteCamera('${cam.id}')"
                                        class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:text-red-400 hover:bg-red-400/10 transition-colors"
                                        title="Xoa">
                                    <i class="fas fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /* Modal */
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Camera';
            document.getElementById('cameraForm').reset();
            document.getElementById('cameraId').value = '';
            document.getElementById('cameraIdInput').disabled = false;
            document.getElementById('cameraPort').value = '554';
            document.getElementById('cameraEnabled').checked = true;
            showSheet();
        }

        function editCamera(id) {
            const cam = cameras.find(c => c.id === id);
            if (!cam) return;
            document.getElementById('modalTitle').textContent = 'Sửa Camera';
            document.getElementById('cameraId').value = cam.id;
            document.getElementById('cameraIdInput').value = cam.id;
            document.getElementById('cameraIdInput').disabled = true;
            document.getElementById('cameraName').value = cam.name;
            document.getElementById('cameraIp').value = cam.ip;
            document.getElementById('cameraPort').value = cam.port;
            document.getElementById('cameraUsername').value = cam.username;
            document.getElementById('cameraPassword').value = cam.password;
            document.getElementById('cameraRtspPath').value = cam.rtsp_path;
            document.getElementById('cameraEnabled').checked = cam.enabled;
            showSheet();
        }

        function showSheet() {
            const modal = document.getElementById('cameraModal');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                document.getElementById('sheetPanel').style.transform = 'translateY(0)';
            });
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('sheetPanel').style.transform = 'translateY(100%)';
            setTimeout(() => {
                document.getElementById('cameraModal').classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        function handleBackdropClick(e) {
            if (e.target === document.getElementById('cameraModal') || e.target === document.getElementById('cameraModal').firstElementChild) {
                closeModal();
            }
        }

        /* Form submit */
        document.getElementById('cameraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('cameraId').value;
            const data = {
                id: document.getElementById('cameraIdInput').value,
                name: document.getElementById('cameraName').value,
                ip: document.getElementById('cameraIp').value,
                port: parseInt(document.getElementById('cameraPort').value),
                username: document.getElementById('cameraUsername').value,
                password: document.getElementById('cameraPassword').value,
                rtsp_path: document.getElementById('cameraRtspPath').value,
                enabled: document.getElementById('cameraEnabled').checked,
                stream_type: "main"
            };

            try {
                const res = await fetch(id ? `/api/cameras/${id}` : '/api/cameras', {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Lỗi'); }
                closeModal();
                loadCameras();
                showToast(id ? 'Đã cập nhật camera' : 'Đã thêm camera');
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function deleteCamera(id) {
            if (!confirm('Xóa camera này?')) return;
            try {
                const res = await fetch(`/api/cameras/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Lỗi xóa camera');
                loadCameras();
                showToast('Đã xóa camera');
            } catch (err) { showToast(err.message, 'error'); }
        }

        /* Toast */
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const inner = document.getElementById('toastInner');
            const icon = document.getElementById('toastIcon');

            const styles = {
                success: { bg: 'bg-emerald-600/90 text-white', icon: 'fa-check-circle' },
                error:   { bg: 'bg-red-600/90 text-white', icon: 'fa-circle-exclamation' },
                info:    { bg: 'bg-blue-600/90 text-white', icon: 'fa-circle-info' }
            };
            const s = styles[type] || styles.success;
            inner.className = `flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg text-sm font-medium toast-in backdrop-blur ${s.bg}`;
            icon.className = `fas ${s.icon}`;
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.remove('hidden');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        /* Recording toggle */
        let recStatus = {};

        async function toggleRecording(cameraId) {
            const isRec = recStatus[cameraId];
            const action = isRec ? 'stop' : 'start';
            try {
                await fetch(`/api/recording/${action}/${cameraId}`, { method: 'POST' });
                showToast(isRec ? 'Da dung ghi' : 'Bat dau ghi hinh');
                setTimeout(pollRecStatus, 300);
            } catch (e) {
                showToast('Loi ghi hinh', 'error');
            }
        }

        async function pollRecStatus() {
            try {
                const res = await fetch('/api/recording/status');
                const data = await res.json();
                recStatus = {};
                for (const [cid, st] of Object.entries(data)) {
                    recStatus[cid] = st.recording;
                    const btn = document.getElementById(`rec-btn-${cid}`);
                    if (btn) {
                        if (st.recording) {
                            btn.classList.remove('text-gray-500');
                            btn.classList.add('text-red-500');
                            btn.innerHTML = '<i class="fas fa-circle text-xs animate-pulse"></i>';
                            btn.title = 'Dung ghi';
                        } else {
                            btn.classList.remove('text-red-500');
                            btn.classList.add('text-gray-500');
                            btn.innerHTML = '<i class="fas fa-circle text-xs"></i>';
                            btn.title = 'Ghi hinh';
                        }
                    }
                }
            } catch (e) {}
        }

        /* Poll status */
        setInterval(async () => {
            try {
                const res = await fetch('/api/cameras/status/all');
                const statuses = await res.json();
                let online = 0;
                statuses.forEach(s => {
                    if (!s || !s.id) return;
                    const el = document.getElementById(`fps-${s.id}`);
                    if (el) el.textContent = `${(s.fps || 0).toFixed(0)} fps`;
                    if (s.online) online++;
                });
                document.getElementById('onlineCameras').textContent = online;
                document.getElementById('offlineCameras').textContent = cameras.length - online;
            } catch (e) {}
            pollRecStatus();
        }, 3000);

        // Initial recording status
        setTimeout(pollRecStatus, 1000);
    </script>
</body>
</html>
