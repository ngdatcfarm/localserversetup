<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ camera_name }} - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .stream-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .stream-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        /* PTZ D-pad */
        .ptz-overlay {
            position: fixed; bottom: 24px; right: 24px; z-index: 50;
            background: rgba(31,41,55,0.85); border-radius: 16px; padding: 16px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
        }
        .ptz-panel {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 6px; width: 144px;
        }
        .ptz-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            background: #374151; color: #d1d5db; transition: all 0.15s;
            font-size: 16px; user-select: none;
        }
        .ptz-btn:hover { background: #3b82f6; color: white; }
        .ptz-btn:active { background: #2563eb; transform: scale(0.9); }
        .ptz-btn.center { background: transparent; cursor: default; font-size: 10px; }
        .ptz-btn.center:hover { background: transparent; color: #4b5563; }
        /* Top bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
        }
        .top-bar a { color: #9ca3af; text-decoration: none; }
        .top-bar a:hover { color: white; }
        /* Speed slider */
        .speed-control {
            display: flex; align-items: center; gap: 8px;
            margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .speed-control input[type="range"] {
            width: 100%; accent-color: #3b82f6; height: 4px;
        }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="top-bar">
        <div class="flex items-center gap-3">
            <a href="/" title="Quay lại"><i class="fas fa-arrow-left text-lg"></i></a>
            <span class="text-white font-semibold">{{ camera_name }}</span>
        </div>
        <span class="text-gray-400 text-sm">{{ camera_ip }}</span>
    </div>

    <!-- Stream -->
    <div class="stream-container">
        <img src="/stream/{{ camera_id }}/mjpeg" alt="Stream" id="streamImg">
        <div id="offlineMsg" class="absolute text-gray-500 text-center hidden">
            <i class="fas fa-video-slash text-5xl mb-3"></i>
            <p>Camera offline</p>
        </div>
    </div>

    <!-- PTZ Controls -->
    <div class="ptz-overlay" id="ptzPanel">
        <div class="ptz-panel">
            <div></div>
            <button class="ptz-btn" onmousedown="ptzMove('up')" onmouseup="ptzStop('up')" onmouseleave="ptzStop('up')"
                    ontouchstart="ptzMove('up')" ontouchend="ptzStop('up')" title="Lên">
                <i class="fas fa-chevron-up"></i>
            </button>
            <div></div>
            <button class="ptz-btn" onmousedown="ptzMove('left')" onmouseup="ptzStop('left')" onmouseleave="ptzStop('left')"
                    ontouchstart="ptzMove('left')" ontouchend="ptzStop('left')" title="Trái">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="ptz-btn center"><i class="fas fa-circle text-gray-600"></i></div>
            <button class="ptz-btn" onmousedown="ptzMove('right')" onmouseup="ptzStop('right')" onmouseleave="ptzStop('right')"
                    ontouchstart="ptzMove('right')" ontouchend="ptzStop('right')" title="Phải">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div></div>
            <button class="ptz-btn" onmousedown="ptzMove('down')" onmouseup="ptzStop('down')" onmouseleave="ptzStop('down')"
                    ontouchstart="ptzMove('down')" ontouchend="ptzStop('down')" title="Xuống">
                <i class="fas fa-chevron-down"></i>
            </button>
            <div></div>
        </div>
        <!-- Speed -->
        <div class="speed-control">
            <i class="fas fa-gauge text-gray-400 text-xs"></i>
            <input type="range" id="speedSlider" min="1" max="10" value="6" title="Tốc độ">
            <span class="text-gray-400 text-xs w-4" id="speedValue">6</span>
        </div>
    </div>

    <script>
        const CAMERA_ID = '{{ camera_id }}';

        function getSpeed() {
            return parseInt(document.getElementById('speedSlider').value);
        }

        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedValue').textContent = this.value;
        });

        async function ptzMove(direction) {
            try {
                await fetch(`/api/cameras/${CAMERA_ID}/ptz/move`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ direction, speed: getSpeed() })
                });
            } catch (e) {
                console.error('PTZ move error:', e);
            }
        }

        async function ptzStop(direction) {
            try {
                await fetch(`/api/cameras/${CAMERA_ID}/ptz/stop`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ direction, speed: getSpeed() })
                });
            } catch (e) {
                console.error('PTZ stop error:', e);
            }
        }

        // Keyboard controls
        const keyMap = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
        const activeKeys = new Set();

        document.addEventListener('keydown', (e) => {
            const dir = keyMap[e.key];
            if (dir && !activeKeys.has(dir)) {
                activeKeys.add(dir);
                ptzMove(dir);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            const dir = keyMap[e.key];
            if (dir) {
                activeKeys.delete(dir);
                ptzStop(dir);
                e.preventDefault();
            }
        });

        // Stream error handling
        document.getElementById('streamImg').addEventListener('error', function() {
            this.classList.add('hidden');
            document.getElementById('offlineMsg').classList.remove('hidden');
        });
    </script>
</body>
</html>
