<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>{{ camera_name }} - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; overflow: hidden; height: 100%; width: 100%; touch-action: none; }

        /* Stream fills viewport */
        .stream-wrap {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .stream-wrap img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* Auto-hide UI */
        .ui-layer { transition: opacity 0.3s; }
        .ui-hidden .ui-layer { opacity: 0; pointer-events: none; }

        /* Top bar gradient */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 40;
            background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
            padding: env(safe-area-inset-top, 0) 0 0 0;
        }
        .top-bar-inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; gap: 12px;
        }

        /* Bottom controls tray */
        .bottom-tray {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 0 0 env(safe-area-inset-bottom, 0) 0;
        }
        .bottom-inner { padding: 20px 16px 16px; }

        /* PTZ Joystick */
        .ptz-ring {
            width: 140px; height: 140px; position: relative;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(55,65,81,0.6) 30%, rgba(55,65,81,0.3) 70%);
            border: 2px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }
        .ptz-dir {
            position: absolute; width: 44px; height: 44px;
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.08); color: #d1d5db;
            font-size: 15px; user-select: none;
            transition: background 0.1s, transform 0.1s;
        }
        .ptz-dir:active, .ptz-dir.active { background: #3b82f6; color: white; transform: scale(0.9); }
        .ptz-dir.up    { top: 2px;  left: 50%; transform: translateX(-50%); }
        .ptz-dir.down  { bottom: 2px; left: 50%; transform: translateX(-50%); }
        .ptz-dir.left  { left: 2px; top: 50%; transform: translateY(-50%); }
        .ptz-dir.right { right: 2px; top: 50%; transform: translateY(-50%); }
        .ptz-dir.up:active    { transform: translateX(-50%) scale(0.9); }
        .ptz-dir.down:active  { transform: translateX(-50%) scale(0.9); }
        .ptz-dir.left:active  { transform: translateY(-50%) scale(0.9); }
        .ptz-dir.right:active { transform: translateY(-50%) scale(0.9); }
        .ptz-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        }

        /* Speed slider */
        .speed-track {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.1); outline: none;
        }
        .speed-track::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #3b82f6; border: 2px solid #1e3a5f;
            cursor: pointer;
        }

        /* Action buttons */
        .action-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.08); color: #d1d5db;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.15s;
            backdrop-filter: blur(8px);
        }
        .action-btn:active { background: rgba(255,255,255,0.2); }
        .action-btn.active { background: #3b82f6; color: white; }

        /* Preset buttons */
        .preset-bar {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .preset-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: #d1d5db;
            font-size: 13px; cursor: pointer; transition: all 0.15s;
            backdrop-filter: blur(8px); text-transform: capitalize;
            user-select: none; white-space: nowrap;
        }
        .preset-btn:active { background: #3b82f6; color: white; border-color: #3b82f6; transform: scale(0.95); }
        .preset-btn.saving { border-color: #f59e0b; color: #f59e0b; animation: pulse-border 1s infinite; }
        @keyframes pulse-border { 50% { border-color: transparent; } }
        .preset-save-hint {
            font-size: 11px; color: #6b7280; text-align: center;
        }

        /* Toast notification */
        .toast {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            padding: 8px 20px; border-radius: 20px; font-size: 13px;
            color: white; z-index: 9999; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            backdrop-filter: blur(12px);
        }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(34,197,94,0.85); }
        .toast.error { background: rgba(239,68,68,0.85); }

        /* Landscape optimization */
        @media (orientation: landscape) and (max-height: 500px) {
            .top-bar-inner { padding: 6px 16px; }
            .bottom-inner { padding: 8px 16px; }
            .ptz-ring { width: 110px; height: 110px; }
            .ptz-dir { width: 36px; height: 36px; font-size: 13px; }
            .bottom-layout { flex-direction: row; align-items: center; }
            .speed-row { max-width: 160px; }
        }

        /* Offline state */
        .offline-state {
            position: fixed; inset: 0; z-index: 10;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: #000; color: #6b7280; gap: 12px;
        }
        .offline-state.show { display: flex; }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
    <!-- Tap zone to toggle UI -->
    <div class="stream-wrap" id="streamWrap" onclick="toggleUI()">
        <img src="/stream/{{ camera_id }}/mjpeg" alt="Stream" id="streamImg">
    </div>

    <!-- Offline -->
    <div class="offline-state" id="offlineState">
        <i class="fas fa-video-slash text-4xl"></i>
        <p class="text-sm">Camera offline</p>
        <button onclick="location.reload()" class="mt-2 px-4 py-2 bg-gray-800 rounded-xl text-sm text-gray-300">
            <i class="fas fa-rotate-right mr-1.5"></i>Thử lại
        </button>
    </div>

    <!-- Top Bar -->
    <div class="top-bar ui-layer" id="topBar">
        <div class="top-bar-inner">
            <div class="flex items-center gap-3 min-w-0">
                <a href="/" class="action-btn flex-shrink-0" style="width:36px;height:36px">
                    <i class="fas fa-chevron-left text-sm"></i>
                </a>
                <div class="min-w-0">
                    <div class="text-white font-semibold text-sm truncate">{{ camera_name }}</div>
                    <div class="text-gray-500 text-[11px]">{{ camera_ip }}</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="action-btn" onclick="getPosition()" title="Xem vị trí">
                    <i class="fas fa-crosshairs text-sm"></i>
                </button>
                <button class="action-btn" onclick="tarePosition()" title="Đặt làm gốc tọa độ">
                    <i class="fas fa-target text-sm"></i>
                </button>
                <button class="action-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Toàn màn hình">
                    <i class="fas fa-expand text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-tray ui-layer" id="bottomTray">
        <div class="bottom-inner">
            <div class="bottom-layout flex flex-col items-center gap-4">
                <!-- Presets -->
                <div class="w-full max-w-[340px]">
                    <div class="preset-bar" id="presetBar">
                        <!-- Rendered by JS -->
                    </div>
                    <div class="preset-save-hint mt-2" id="presetHint">Nhấn giữ 2s để lưu vị trí hiện tại</div>
                </div>

                <!-- PTZ Ring -->
                <div class="ptz-ring" id="ptzRing">
                    <button class="ptz-dir up" data-dir="up"><i class="fas fa-chevron-up"></i></button>
                    <button class="ptz-dir down" data-dir="down"><i class="fas fa-chevron-down"></i></button>
                    <button class="ptz-dir left" data-dir="left"><i class="fas fa-chevron-left"></i></button>
                    <button class="ptz-dir right" data-dir="right"><i class="fas fa-chevron-right"></i></button>
                    <div class="ptz-center"></div>
                </div>

                <!-- Speed -->
                <div class="speed-row flex items-center gap-3 w-full max-w-[200px]">
                    <i class="fas fa-gauge-low text-gray-500 text-xs"></i>
                    <input type="range" id="speedSlider" class="speed-track flex-1" min="1" max="10" value="5">
                    <span class="text-gray-400 text-xs font-mono w-4 text-center" id="speedVal">5</span>
                    <i class="fas fa-gauge-high text-gray-500 text-xs"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CAMERA_ID = '{{ camera_id }}';
        let uiVisible = true;
        let hideTimer = null;

        /* UI auto-hide */
        function toggleUI() {
            uiVisible = !uiVisible;
            document.body.classList.toggle('ui-hidden', !uiVisible);
            resetHideTimer();
        }

        function resetHideTimer() {
            clearTimeout(hideTimer);
            if (uiVisible) {
                hideTimer = setTimeout(() => {
                    uiVisible = false;
                    document.body.classList.add('ui-hidden');
                }, 5000);
            }
        }

        // Keep UI visible when interacting with controls
        document.getElementById('bottomTray').addEventListener('click', e => e.stopPropagation());
        document.getElementById('topBar').addEventListener('click', e => e.stopPropagation());
        ['touchstart','mousedown'].forEach(evt => {
            document.getElementById('bottomTray').addEventListener(evt, () => {
                clearTimeout(hideTimer);
            });
        });
        ['touchend','mouseup'].forEach(evt => {
            document.getElementById('bottomTray').addEventListener(evt, () => {
                resetHideTimer();
            });
        });

        resetHideTimer();

        /* Speed */
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        speedSlider.addEventListener('input', () => { speedVal.textContent = speedSlider.value; });

        function getSpeed() { return parseInt(speedSlider.value); }

        /* PTZ Controls - Send continuously while holding */
        let ptzInterval = null;
        let ptzDirection = null;

        async function ptzMove(dir) {
            ptzDirection = dir;
            // Gửi move liên tục mỗi 0.5s để đếm số giây
            if (ptzInterval) return;
            ptzInterval = setInterval(async () => {
                try {
                    await fetch(`/api/cameras/${CAMERA_ID}/ptz/move`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ direction: ptzDirection, speed: getSpeed() })
                    });
                } catch (e) {}
            }, 500);
        }

        async function ptzStop(dir) {
            if (ptzInterval) {
                clearInterval(ptzInterval);
                ptzInterval = null;
            }
            try {
                await fetch(`/api/cameras/${CAMERA_ID}/ptz/stop`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ direction: dir, speed: getSpeed() })
                });
            } catch (e) { console.error('PTZ:', e); }
            ptzDirection = null;
        }

        // Bind PTZ buttons (mouse + touch)
        document.querySelectorAll('.ptz-dir').forEach(btn => {
            const dir = btn.dataset.dir;

            btn.addEventListener('mousedown', e => { e.preventDefault(); ptzMove(dir); btn.classList.add('active'); });
            btn.addEventListener('mouseup', () => { ptzStop(dir); btn.classList.remove('active'); });
            btn.addEventListener('mouseleave', () => { ptzStop(dir); btn.classList.remove('active'); });

            btn.addEventListener('touchstart', e => { e.preventDefault(); ptzMove(dir); btn.classList.add('active'); }, { passive: false });
            btn.addEventListener('touchend', e => { e.preventDefault(); ptzStop(dir); btn.classList.remove('active'); });
            btn.addEventListener('touchcancel', () => { ptzStop(dir); btn.classList.remove('active'); });

            // Prevent click from toggling UI
            btn.addEventListener('click', e => e.stopPropagation());
        });

        /* Keyboard controls */
        const keyMap = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' };
        const activeKeys = new Set();

        document.addEventListener('keydown', e => {
            const dir = keyMap[e.key];
            if (dir && !activeKeys.has(dir)) {
                activeKeys.add(dir);
                ptzMove(dir);
                const btn = document.querySelector(`.ptz-dir.${dir}`);
                if (btn) btn.classList.add('active');
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            const dir = keyMap[e.key];
            if (dir) {
                activeKeys.delete(dir);
                ptzStop(dir);
                const btn = document.querySelector(`.ptz-dir.${dir}`);
                if (btn) btn.classList.remove('active');
                e.preventDefault();
            }
        });

        /* Fullscreen */
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreenBtn');
            const icon = btn.querySelector('i');
            if (document.fullscreenElement) {
                icon.className = 'fas fa-compress text-sm';
                btn.classList.add('active');
            } else {
                icon.className = 'fas fa-expand text-sm';
                btn.classList.remove('active');
            }
        });

        /* ── Presets ── */
        let presets = [];
        let longPressTimer = null;

        async function loadPresets() {
            try {
                const res = await fetch(`/api/cameras/${CAMERA_ID}/ptz/presets`);
                const data = await res.json();
                // API returns {local: [...], hardware: [...]} or just array
                presets = data.local || data;
                renderPresets();
            } catch (e) { console.error('Load presets:', e); }
        }

        function renderPresets() {
            const bar = document.getElementById('presetBar');
            if (!presets || !presets.length) {
                bar.innerHTML = '<span class="text-gray-600 text-xs">Chưa có preset</span>';
                return;
            }
            bar.innerHTML = presets.map(p => `
                <button class="preset-btn" data-number="${p.number}" data-name="${p.name}">
                    <i class="fas fa-location-dot mr-1" style="font-size:11px"></i>${p.name}
                </button>
            `).join('');

            // Bind: tap = goto, long press = save
            bar.querySelectorAll('.preset-btn').forEach(btn => {
                const num = parseInt(btn.dataset.number);
                const name = btn.dataset.name;

                // Mouse
                btn.addEventListener('mousedown', e => { e.preventDefault(); startLongPress(btn, num, name); });
                btn.addEventListener('mouseup', () => endLongPress(btn, num));
                btn.addEventListener('mouseleave', () => cancelLongPress(btn));

                // Touch
                btn.addEventListener('touchstart', e => { e.preventDefault(); startLongPress(btn, num, name); }, { passive: false });
                btn.addEventListener('touchend', e => { e.preventDefault(); endLongPress(btn, num); });
                btn.addEventListener('touchcancel', () => cancelLongPress(btn));

                btn.addEventListener('click', e => e.stopPropagation());
            });
        }

        function startLongPress(btn, num, name) {
            btn._longPressed = false;
            longPressTimer = setTimeout(() => {
                btn._longPressed = true;
                btn.classList.add('saving');
                savePreset(num, name, btn);
            }, 2000);
        }

        function endLongPress(btn, num) {
            clearTimeout(longPressTimer);
            if (!btn._longPressed) {
                gotoPreset(num, btn);
            }
        }

        function cancelLongPress(btn) {
            clearTimeout(longPressTimer);
            btn.classList.remove('saving');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove('show'), 2000);
        }

        async function gotoPreset(num, btn) {
            const name = btn.dataset.name || `preset ${num}`;
            try {
                btn.style.background = '#3b82f6'; btn.style.color = 'white';
                const res = await fetch(`/api/cameras/${CAMERA_ID}/ptz/presets/${num}/goto`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`→ ${name}`, 'success');
                } else {
                    showToast(`Lỗi: ${data.detail || 'Không thể quay'}`, 'error');
                    console.error('Goto preset failed:', data);
                }
            } catch (e) {
                showToast(`Lỗi kết nối camera`, 'error');
                console.error('Goto preset:', e);
            } finally {
                setTimeout(() => { btn.style.background = ''; btn.style.color = ''; }, 500);
            }
        }

        async function savePreset(num, name, btn) {
            try {
                const res = await fetch(`/api/cameras/${CAMERA_ID}/ptz/presets/${num}/set`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`"${name}" đã lưu vị trí!`, 'success');
                } else {
                    showToast(`Lỗi lưu preset`, 'error');
                }
            } catch (e) {
                showToast(`Lỗi kết nối`, 'error');
                console.error('Save preset:', e);
            }
            finally { btn.classList.remove('saving'); }
        }

        // Load presets on page load
        loadPresets();

        /* Get Position - Debug */
        async function getPosition() {
            try {
                const res = await fetch(`/api/cameras/${CAMERA_ID}/ptz/position`);
                const data = await res.json();
                if (data.success) {
                    const pos = `Vị trí: Pan=${data.pan} | Tilt=${data.tilt}`;
                    document.getElementById('presetHint').textContent = pos;
                    setTimeout(() => {
                        document.getElementById('presetHint').textContent = 'Nhấn giữ 2s để lưu vị trí hiện tại';
                    }, 5000);
                } else {
                    alert('Lỗi: ' + (data.message || 'Unknown'));
                }
            } catch (e) {
                alert('Lỗi kết nối: ' + e.message);
            }
        }

        /* Tare - Set current position as origin */
        async function tarePosition() {
            try {
                const res = await fetch(`/api/cameras/${CAMERA_ID}/ptz/tare`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('presetHint').textContent = '✓ Đã đặt làm gốc tọa độ!';
                    setTimeout(() => {
                        document.getElementById('presetHint').textContent = 'Nhấn giữ 2s để lưu vị trí hiện tại';
                    }, 3000);
                } else {
                    alert('Lỗi: ' + (data.message || 'Unknown'));
                }
            } catch (e) {
                alert('Lỗi kết nối: ' + e.message);
            }
        }

        /* Stream error */
        document.getElementById('streamImg').addEventListener('error', () => {
            document.getElementById('offlineState').classList.add('show');
        });
    </script>
</body>
</html>
