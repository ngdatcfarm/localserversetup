# =================================================================
# Mosquitto MQTT Broker - CFarm Local Server
# Fixed: Listen on all interfaces for LAN access
# =================================================================

# --- Listener ---
# MQTT standard port - bind to ALL interfaces (0.0.0.0)
listener 1883 0.0.0.0
protocol mqtt

# Allow anonymous connections (for ESP32 devices without credentials)
allow_anonymous true

# ACL Configuration
acl_file E:\Local-server\docker\mosquitto\config\acl
password_file E:\Local-server\docker\mosquitto\config\passwd

# WebSocket port (for webapp hybrid)
listener 9001
protocol websockets
http_dir C:\Program Files\Mosquitto\dashboard

# --- Persistence ---
persistence true
persistence_location C:\Program Files\Mosquitto\data\

# --- Logging ---
log_dest file C:\Program Files\Mosquitto\log\mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
