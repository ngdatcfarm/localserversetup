# ============================================
# Mosquitto MQTT Broker - CFarm Local Server
# ============================================

# --- Listener ---
# MQTT standard port
listener 1883
protocol mqtt

# WebSocket port (cho webapp hybrid)
listener 9001
protocol websockets

# --- Authentication ---
allow_anonymous false
password_file /mosquitto/config/passwd

# --- ACL (Access Control) ---
acl_file /mosquitto/config/acl

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
